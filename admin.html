<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم — line4ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1B1B2F;
            --ink-soft: #34344d;
            --accent: #3454D1;
            --accent-hover: #2b45b3;
            --accent-soft: #E8EDFC;
            --paper: #F7F4EE;
            --paper-alt: #EFEAE0;
            --card: #FFFFFF;
            --line: #E3DDCE;
            --text: #1B1B2F;
            --muted: #6B7280;
            --success: #1F9D6C;
            --success-soft: #E3F5EC;
            --danger: #C4432B;
            --danger-soft: #FBEAE5;
            --warn: #B4691E;
            --warn-soft: #FBF0DE;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', system-ui, sans-serif;
            color: var(--text);
            padding: 32px 16px;
            background-color: var(--paper);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(27,27,47,0.06) 1px, transparent 0);
            background-size: 22px 22px;
        }

        .page-wrap { width: 100%; max-width: 460px; }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
            direction: rtl;
        }
        .brand-mark {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: var(--ink);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .brand-mark svg { width: 18px; height: 18px; }
        .brand-name {
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 19px;
            letter-spacing: 0.2px;
            color: var(--ink);
        }
        .brand-name span { color: var(--accent); }

        .receipt-edge {
            height: 13px;
            width: 100%;
            background: var(--card);
            clip-path: polygon(
                0% 100%, 0% 0%, 5% 100%, 10% 0%, 15% 100%, 20% 0%, 25% 100%, 30% 0%,
                35% 100%, 40% 0%, 45% 100%, 50% 0%, 55% 100%, 60% 0%, 65% 100%, 70% 0%,
                75% 100%, 80% 0%, 85% 100%, 90% 0%, 95% 100%, 100% 0%, 100% 100%
            );
        }

        .admin-panel {
            display: none;
            width: 100%;
            background: var(--card);
            border-radius: 0 0 20px 20px;
            box-shadow: 0 30px 60px -20px rgba(27,27,47,0.18);
            text-align: center;
            direction: rtl;
        }
        .admin-panel-inner { padding: 8px 34px 34px; }

        h2 {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            margin: 4px 0 22px 0;
            font-size: 21px;
            font-weight: 700;
        }
        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--accent);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            font-family: 'IBM Plex Mono', monospace;
            direction: ltr;
        }

        .search-box {
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 10px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14.5px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            text-align: right;
            background: var(--paper);
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); background: #fff; }
        .search-box::placeholder { color: var(--muted); }

        select {
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 18px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            background-color: #fff;
            color: var(--text);
            cursor: pointer;
            outline: none;
            font-weight: 500;
        }
        select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

        .meta-card {
            background: var(--paper);
            padding: 18px 18px 6px;
            border-radius: 14px;
            margin-bottom: 18px;
            text-align: right;
            border: 1px dashed var(--line);
            display: none;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .meta-label { font-size: 13.5px; color: var(--muted); font-weight: 500; }
        .view-badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 13px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13.5px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .toggle-btn {
            background: var(--success-soft);
            color: var(--success);
            border: 1.5px solid transparent;
            padding: 7px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12.5px;
            font-family: inherit;
            transition: all 0.15s;
        }
        .toggle-btn:hover { filter: brightness(0.96); }
        .toggle-btn.paused { background: var(--danger-soft); color: var(--danger); }

        input[type="date"] {
            padding: 8px 10px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--text);
            outline: none;
            background: #fff;
        }
        input[type="date"]:focus { border-color: var(--accent); }

        button.main-btn {
            background: var(--ink);
            color: #fff;
            border: none;
            padding: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 15.5px;
            font-weight: 700;
            border-radius: 13px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.15s;
        }
        button.main-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button.main-btn:active { transform: translateY(0); }

        .result-box {
            margin-top: 24px;
            padding-top: 22px;
            border-top: 1.5px dashed var(--line);
            display: none;
        }
        .result-title {
            display: block;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .url-text {
            background: var(--paper);
            padding: 11px 13px;
            border-radius: 9px;
            font-size: 12.5px;
            word-break: break-all;
            display: block;
            margin-bottom: 16px;
            text-align: left;
            direction: ltr;
            color: var(--ink-soft);
            border: 1px solid var(--line);
            font-family: 'IBM Plex Mono', monospace;
        }
        .qr-wrap {
            display: flex;
            justify-content: center;
        }
        .qr-img {
            width: 176px;
            height: 176px;
            border: 1.5px solid var(--line);
            padding: 14px;
            border-radius: 16px;
            background: #fff;
        }
        .hint {
            color: var(--muted);
            display: block;
            margin-top: 10px;
            font-size: 12.5px;
        }

        #loading, #error-msg {
            padding: 13px 15px;
            border-radius: 11px;
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        #loading { color: var(--warn); background: var(--warn-soft); }
        #error-msg { color: var(--danger); background: var(--danger-soft); display: none; }
    </style>
</head>
<body>

    <div class="page-wrap">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 6 9 6 14a6 6 0 0012 0c0-5-6-12-6-12z" fill="#F7F4EE"/></svg>
            </div>
            <div class="brand-name">line<span>4</span>ink</div>
        </div>

        <div class="receipt-edge"></div>
        <div class="admin-panel" id="panel">
            <div class="admin-panel-inner">
                <span class="eyebrow">ADMIN CONSOLE</span>
                <h2>لوحة التحكم في المستندات</h2>

                <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث عن ملف من المرفوعين..." oninput="filterFiles()">

                <div id="loading">جاري جلب الملفات من جيت هاب...</div>
                <div id="error-msg"></div>

                <select id="fileSelect" style="display:none;" onchange="onFileSelected()"></select>

                <div id="metaCard" class="meta-card">
                    <div class="meta-row">
                        <span class="meta-label">👁️ إجمالي عدد المشاهدات</span>
                        <span id="viewCount" class="view-badge">0</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">⚙️ حالة الباركود الحالية</span>
                        <button id="statusToggleBtn" class="toggle-btn" onclick="toggleStatus()">نشط وشغال</button>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">⏳ تاريخ انتهاء الصلاحية</span>
                        <input type="date" id="expireDateInput">
                    </div>
                </div>

                <button id="genBtn" class="main-btn" onclick="saveAndGenerateQR()" style="display:none;">حفظ الإعدادات وتوليد الباركود</button>

                <div id="resultBox" class="result-box">
                    <strong class="result-title">الرابط الذكي للملف</strong>
                    <span id="generatedUrl" class="url-text"></span>
                    <div class="qr-wrap"><img id="qrCodeImg" class="qr-img" src="" alt="QR Code"></div>
                    <small class="hint">💡 كليك يمين واحفظ صورة الباركود للطباعة</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dbBucket = "cb_line4ink_qr_2026"; 
        let allFiles = []; 
        let currentFileStatus = "active";

        const password = prompt("من فضلك أدخل كلمة المرور للدخول للوحة التحكم:");
        if (password === "Mohamed@9498#") {
            document.getElementById('panel').style.display = 'block';
            loadFilesFromGitHub(); 
        } else {
            alert("كلمة مرور خاطئة!");
            window.location.href = "index.html"; 
        }

        async function loadFilesFromGitHub() {
            try {
                const response = await fetch(`https://api.github.com/repos/line4ink/qr-viewer/contents/images`);
                if (!response.ok) throw new Error('تعذر العثور على المجلد.');
                
                const files = await response.json();
                allFiles = files.filter(f => f.type === 'file');
                
                renderDropdown(allFiles);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('fileSelect').style.display = 'block';
                document.getElementById('genBtn').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').innerText = `⚠️ خطأ: ${error.message}`;
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function renderDropdown(filesList) {
            const select = document.getElementById('fileSelect');
            select.innerHTML = '<option value="">-- اختر الملف من القائمة --</option>';
            filesList.forEach(file => {
                const option = document.createElement('option');
                option.value = file.name;
                option.text = file.name;
                select.appendChild(option);
            });
        }

        // ميزة البحث والفلترة الفورية
        function filterFiles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query));
            renderDropdown(filtered);
            document.getElementById('metaCard').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
        }

        // جلب العداد والحالة فور اختيار الملف
        async function onFileSelected() {
            const fileName = document.getElementById('fileSelect').value;
            if (!fileName) { document.getElementById('metaCard').style.display = 'none'; return; }
            
            document.getElementById('metaCard').style.display = 'block';
            document.getElementById('viewCount').innerText = "🔄..";
            
            // 1. جلب عداد الزيارات
            try {
                const vRes = await fetch(`https://kvdb.io/${dbBucket}/views_${fileName}`);
                document.getElementById('viewCount').innerText = vRes.ok ? await vRes.text() : "0";
            } catch(e) { document.getElementById('viewCount').innerText = "0"; }
            
            // 2. جلب إعدادات الصلاحية والتشغيل
            currentFileStatus = "active";
            document.getElementById('expireDateInput').value = "";
            updateStatusButtonUI();

            try {
                const sRes = await fetch(`https://kvdb.io/${dbBucket}/settings_${fileName}`);
                if (sRes.ok) {
                    const data = await sRes.json();
                    currentFileStatus = data.status || "active";
                    document.getElementById('expireDateInput').value = data.expires || "";
                    updateStatusButtonUI();
                }
            } catch(e) {}
        }

        function toggleStatus() {
            currentFileStatus = (currentFileStatus === "active") ? "paused" : "active";
            updateStatusButtonUI();
        }

        function updateStatusButtonUI() {
            const btn = document.getElementById('statusToggleBtn');
            if (currentFileStatus === "active") {
                btn.innerText = "🟢 نشط وشغال (اضغط للإيقاف)";
                btn.className = "toggle-btn";
            } else {
                btn.innerText = "🔴 موقوف مؤقتاً (اضغط للتشغيل)";
                btn.className = "toggle-btn paused";
            }
        }

        // حفظ البيانات السحابية وتوليد الباركود
        async function saveAndGenerateQR() {
            const fileName = document.getElementById('fileSelect').value;
            if (!fileName) return alert('من فضلك اختر ملفاً أولاً!');
            
            const expiresValue = document.getElementById('expireDateInput').value;
            const payload = { status: currentFileStatus, expires: expiresValue };
            
            // حفظ الإعدادات في الـ KV Store سحابياً فوراً
            await fetch(`https://kvdb.io/${dbBucket}/settings_${fileName}`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            // توليد الرابط والباركود
            const finalFileUrl = `${window.location.origin}/index.html?file=${fileName}`;
            document.getElementById('generatedUrl').innerText = finalFileUrl;
            document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(finalFileUrl)}`;
            document.getElementById('resultBox').style.display = 'block';
            alert('تم حفظ إعدادات الصلاحية والتشغيل بنجاح وتحديث الباركود! ✨');
        }
    </script>
</body>
</html>
